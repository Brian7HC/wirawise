<!DOCTYPE html>
<html lang="sw" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#1b4332">
    <meta name="description" content="WIRA WISE - Mũndũ wa Murimi | Kikuyu Agricultural Assistant">
    <title>WIRA WISE – Mũndũ wa Murimi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ═══════════════════════════════════════════
           DESIGN TOKENS - WIRA WISE BLENDED DESIGN
        ═══════════════════════════════════════════ */
        :root {
            --c-moss:   #1b4332;
            --c-fern:   #2d6a4f;
            --c-leaf:   #40916c;
            --c-sage:   #74c69d;
            --c-mist:   #b7e4c7;
            --c-dew:    #d8f3dc;
            --c-gold:   #e9a825;
            --c-amber:  #f4a261;
            --kenya-red: #DC143C;
            
            --bg:           #f0faf3;
            --bg-alt:       #e4f4e9;
            --surface:      #ffffff;
            --surface-alt:  #f6fcf8;
            --border:       #c3e6cc;
            --border-hi:    #74c69d;
            --tx-1:         #0d2b1a;
            --tx-2:         #3a5a47;
            --tx-3:         #6b8f7a;
            --tx-inv:       #ffffff;
            --accent:       #2d6a4f;
            --accent-glow:  rgba(45,106,79,0.18);
            
            --sh-sm: 0 1px 4px rgba(13,43,26,0.08);
            --sh-md: 0 4px 20px rgba(13,43,26,0.10);
            --sh-lg: 0 8px 40px rgba(13,43,26,0.14);
            
            --r-sm: 8px;
            --r-md: 14px;
            --r-lg: 20px;
            --r-xl: 26px;
            --r-f:  999px;
            
            --ease: cubic-bezier(0.16,1,0.3,1);
            --tf:   150ms;
            --tb:   260ms;
            --ts:   420ms;
        }

        [data-theme="dark"] {
            --bg:          #0a1f12;
            --bg-alt:      #0d2419;
            --surface:     #112b1a;
            --surface-alt: #0f2416;
            --border:      #1e4a2a;
            --border-hi:   #2d6a4f;
            --tx-1:        #e8f5ec;
            --tx-2:        #9ed4b2;
            --tx-3:        #5e9e78;
            --sh-md:       0 4px 20px rgba(0,0,0,0.4);
            --sh-lg:       0 8px 40px rgba(0,0,0,0.5);
            --accent-glow: rgba(116,198,157,0.14);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; scroll-behavior: smooth; }
        body {
            font-family: 'Nunito',system-ui,sans-serif;
            background: var(--bg);
            color: var(--tx-1);
            line-height: 1.6;
            min-height: 100vh;
            transition: background var(--tb) var(--ease), color var(--tb) var(--ease);
            overflow-x: hidden;
        }
        
        /* Background effects */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse 70% 50% at 5% 0%, rgba(45,106,79,0.12) 0%, transparent 65%),
                radial-gradient(ellipse 50% 55% at 95% 100%, rgba(233,168,37,0.07) 0%, transparent 65%);
        }

        /* ═══════════════════════════════════════════
           APP CONTAINER
        ═══════════════════════════════════════════ */
        .app {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 0 auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 100vh;
        }

        /* ═══════════════════════════════════════════
           HEADER
        ═══════════════════════════════════════════ */
        .header {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--r-xl);
            box-shadow: var(--sh-md);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: fadeDown var(--ts) var(--ease) both;
        }
        
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: none; }
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            position: relative;
            width: 48px;
            height: 48px;
            flex-shrink: 0;
        }

        .logo-face {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, var(--c-moss), var(--c-leaf));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            box-shadow: 0 4px 16px rgba(27,67,50,0.38), inset 0 1px 0 rgba(255,255,255,0.15);
            transition: transform var(--tb) var(--ease);
        }

        .logo-box:hover .logo-face {
            transform: rotate(-5deg) scale(1.06);
        }

        .logo-dot {
            position: absolute;
            top: -3px;
            right: -3px;
            width: 12px;
            height: 12px;
            background: var(--c-gold);
            border-radius: 50%;
            border: 2px solid var(--surface);
            animation: pulseDot 2.4s ease-in-out infinite;
        }

        @keyframes pulseDot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.35); opacity: 0.7; }
        }

        .brand-text h1 {
            font-family: 'Lora', Georgia, serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--c-moss);
            line-height: 1.1;
            letter-spacing: -0.01em;
        }

        .brand-text p {
            font-size: 0.65rem;
            color: var(--tx-3);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.09em;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border: 1.5px solid var(--border);
            border-radius: var(--r-md);
            background: var(--surface-alt);
            color: var(--tx-2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all var(--tb) var(--ease);
            font-size: 1rem;
        }

        .icon-btn:hover {
            border-color: var(--border-hi);
            color: var(--accent);
        }

        .icon-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--tx-inv);
        }

        /* ═══════════════════════════════════════════
           FEATURE CARDS
        ═══════════════════════════════════════════ */
        .features {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            animation: fadeUp var(--ts) var(--ease) 100ms both;
        }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: none; }
        }

        .feature-card {
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--r-md);
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all var(--tb) var(--ease);
        }

        .feature-card:hover {
            border-color: var(--border-hi);
            transform: translateY(-2px);
            box-shadow: var(--sh-md);
        }

        .feature-card.active {
            background: linear-gradient(135deg, var(--c-moss), var(--c-fern));
            border-color: var(--c-fern);
            color: white;
        }

        .feature-card i {
            font-size: 1.3rem;
            margin-bottom: 4px;
            display: block;
        }

        .feature-card h3 {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .feature-card p {
            font-size: 0.55rem;
            opacity: 0.8;
            margin-top: 2px;
        }

        /* ═══════════════════════════════════════════
           TOPICS BAR
        ═══════════════════════════════════════════ */
        .topics {
            display: flex;
            gap: 8px;
            padding: 10px 14px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--r-lg);
            overflow-x: auto;
            scrollbar-width: none;
        }
        
        .topics::-webkit-scrollbar { display: none; }

        .topic-btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--r-f);
            background: var(--surface-alt);
            color: var(--tx-2);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: all var(--tb) var(--ease);
            border: 2px solid transparent;
        }

        .topic-btn.active {
            background: var(--c-fern);
            color: white;
            box-shadow: var(--sh-sm);
        }

        .topic-btn:hover:not(.active) {
            border-color: var(--border-hi);
        }

        /* ═══════════════════════════════════════════
           CHAT WINDOW
        ═══════════════════════════════════════════ */
        .chat-window {
            flex: 1;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--r-xl);
            box-shadow: var(--sh-md);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 400px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.5;
            animation: msgIn 0.3s ease;
        }
        
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--c-moss), var(--c-fern));
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(27,67,50,0.3);
        }

        .message.bot {
            align-self: flex-start;
            background: var(--surface);
            color: var(--tx-1);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            box-shadow: var(--sh-sm);
        }

        .message.typing {
            background: var(--surface-alt);
            color: var(--tx-3);
            font-style: italic;
        }

        /* ═══════════════════════════════════════════
           WELCOME SCREEN
        ═══════════════════════════════════════════ */
        .welcome {
            text-align: center;
            padding: 30px 20px;
            animation: fadeUp var(--ts) var(--ease) both;
        }
        
        .welcome h2 {
            font-family: 'Lora', serif;
            color: var(--c-moss);
            font-size: 1.6rem;
            margin-bottom: 8px;
        }
        
        .welcome p {
            color: var(--tx-2);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        
        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        
        .quick-btn {
            padding: 10px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--r-f);
            background: var(--surface);
            color: var(--tx-2);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--tb) var(--ease);
        }
        
        .quick-btn:hover {
            border-color: var(--c-fern);
            color: var(--c-fern);
            transform: translateY(-2px);
            box-shadow: var(--sh-md);
        }

        /* ═══════════════════════════════════════════
           INPUT AREA
        ═══════════════════════════════════════════ */
        .input-row {
            padding: 14px;
            background: var(--surface);
            border-top: 1.5px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-row textarea {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: var(--r-lg);
            font-size: 0.95rem;
            font-family: inherit;
            resize: none;
            max-height: 100px;
            outline: none;
            transition: border-color var(--tb) var(--ease);
            background: var(--surface-alt);
            color: var(--tx-1);
        }

        .input-row textarea:focus {
            border-color: var(--c-fern);
        }

        .send-btn {
            width: 48px;
            height: 48px;
            border: none;
            border-radius: var(--r-lg);
            background: linear-gradient(135deg, var(--c-moss), var(--c-fern));
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all var(--tb) var(--ease);
            box-shadow: 0 4px 14px rgba(27,67,50,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(27,67,50,0.4);
        }

        .send-btn:active {
            transform: scale(0.96);
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ═══════════════════════════════════════════
           STATUS BAR
        ═══════════════════════════════════════════ */
        .status-bar {
            padding: 10px 16px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: var(--r-lg);
            font-size: 0.75rem;
            color: var(--tx-3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            animation: pulseDot 2s infinite;
        }

        .topic-badge {
            background: var(--surface-alt);
            padding: 4px 10px;
            border-radius: var(--r-f);
            font-weight: 700;
        }

        /* Hide elements */
        .hidden { display: none !important; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-hi); }
    </style>
</head>
<body>

<div class="app">
    <!-- Header -->
    <header class="header">
        <div class="brand">
            <div class="logo-box">
                <div class="logo-face">🌽</div>
                <div class="logo-dot"></div>
            </div>
            <div class="brand-text">
                <h1>WIRA WISE</h1>
                <p>Mũndũ wa Murimi</p>
            </div>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="themeBtn" onclick="toggleTheme()" title="Theme">
                <i class="fas fa-moon"></i>
            </button>
            <button class="icon-btn" id="voiceBtn" title="Voice Mode">
                <i class="fas fa-microphone"></i>
            </button>
        </div>
    </header>

    <!-- Feature Cards -->
    <div class="features">
        <div class="feature-card active" data-feature="general">
            <i class="fas fa-seedling"></i>
            <h3>Kilimo</h3>
            <p>Farming</p>
        </div>
        <div class="feature-card" data-feature="market">
            <i class="fas fa-chart-line"></i>
            <h3>Soko</h3>
            <p>Markets</p>
        </div>
        <div class="feature-card" data-feature="finance">
            <i class="fas fa-coins"></i>
            <h3>Fedha</h3>
            <p>Finance</p>
        </div>
        <div class="feature-card" data-feature="weather">
            <i class="fas fa-cloud-sun"></i>
            <h3>Hewa</h3>
            <p>Weather</p>
        </div>
    </div>

    <!-- Topics -->
    <div class="topics">
        <button class="topic-btn active" data-topic="general">🌿 General</button>
        <button class="topic-btn" data-topic="farming">🌾 Kilimo</button>
        <button class="topic-btn" data-topic="market">📈 Soko</button>
        <button class="topic-btn" data-topic="finance">💰 Fedha</button>
        <button class="topic-btn" data-topic="weather">🌦 Hewa</button>
    </div>

    <!-- Chat Window -->
    <div class="chat-window">
        <div class="messages" id="messages">
            <div class="welcome" id="welcome">
                <h2>Nikwega! 👋</h2>
                <p>Welcome to WIRA WISE. Ask me anything about farming, crops, weather, or markets in Kenya!</p>
                <div class="quick-actions">
                    <button class="quick-btn" data-msg="Niambie kuhusu kilimo cha mahindi">🌽 Mahindi</button>
                    <button class="quick-btn" data-msg="Bei za soko leo ni gani?">📊 Bei</button>
                    <button class="quick-btn" data-msg="Nitawezaje kupata mkopo?">💳 Mkopo</button>
                    <button class="quick-btn" data-msg="Mbolea gani nzuri?">🌱 Mbolea</button>
                    <button class="quick-btn" data-msg="Wakati wa kupanda?">📅 Msimu</button>
                    <button class="quick-btn" data-msg="Bima ya mazao">🛡️ Bima</button>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="input-row">
            <textarea id="messageInput" rows="1" placeholder="Andika hapa kwa Kikuyu au Kiswahili..." 
                      onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Status -->
    <div class="status-bar">
        <div class="status-left">
            <span class="status-dot"></span>
            <span>WIRA WISE iko tayari</span>
        </div>
        <span class="topic-badge" id="topicBadge">📌 General</span>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:8000/api/v1';
    let sessionId = null;
    let currentTopic = 'general';

    const messagesDiv = document.getElementById('messages');
    const input = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const topicBadge = document.getElementById('topicBadge');
    const welcome = document.getElementById('welcome');
    const themeBtn = document.getElementById('themeBtn');

    // Initialize session
    async function init() {
        try {
            const resp = await fetch(`${API_BASE}/session/create`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            const data = await resp.json();
            sessionId = data.session_id;
            console.log('Session:', sessionId);
        } catch (e) {
            console.error('Session error:', e);
        }
    }
    init();

    // Toggle theme
    function toggleTheme() {
        const html = document.documentElement;
        if (html.getAttribute('data-theme') === 'dark') {
            html.setAttribute('data-theme', 'light');
            themeBtn.innerHTML = '<i class="fas fa-moon"></i>';
        } else {
            html.setAttribute('data-theme', 'dark');
            themeBtn.innerHTML = '<i class="fas fa-sun"></i>';
        }
    }

    // Send message
    async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        if (welcome) welcome.classList.add('hidden');
        
        addMessage(text, 'user');
        input.value = '';
        input.style.height = 'auto';
        
        sendBtn.disabled = true;
        showTyping();

        try {
            const isAgri = isAgricultureQuery(text);
            const endpoint = isAgri ? '/chat/agriculture' : '/chat/text';

            const resp = await fetch(`${API_BASE}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text: text,
                    session_id: sessionId,
                    generate_audio: false
                })
            });

            const data = await resp.json();
            hideTyping();

            const botText = data.response_text || data.response || 'Ndicũraga.';
            addMessage(botText, 'bot');

        } catch (e) {
            hideTyping();
            addMessage('Kosa lililotokea.', 'bot');
            console.error(e);
        }

        sendBtn.disabled = false;
        input.focus();
    }

    // Add message
    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        div.textContent = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // Typing
    function showTyping() {
        const div = document.createElement('div');
        div.className = 'message bot typing';
        div.id = 'typing';
        div.textContent = '...';
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function hideTyping() {
        const t = document.getElementById('typing');
        if (t) t.remove();
    }

    // Check agriculture
    function isAgricultureQuery(text) {
        const keywords = ['crop', 'crops', 'plant', 'farm', 'agriculture', 'harvest', 
            'soil', 'seed', 'fertilizer', 'pest', 'disease', 'rain', 'irrigation',
            'maize', 'wheat', 'beans', 'coffee', 'potato', 'vegetable', 'cabbage',
            'waru', 'mboga', 'ira', 'ngima', 'kuhamba', 'kurima', 'kuvuna', 'mbolea',
            'kilimo', 'soko', 'bei', 'mkopo', 'bima', 'msimu', 'mahindi', 'cafe',
            'irrigation', 'weather', 'climate'];
        const lower = text.toLowerCase();
        return keywords.some(k => lower.includes(k));
    }

    // Feature cards
    document.querySelectorAll('.feature-card').forEach(card => {
        card.addEventListener('click', () => {
            document.querySelectorAll('.feature-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
        });
    });

    // Topic buttons
    document.querySelectorAll('.topic-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTopic = btn.dataset.topic;
            const ico = {general:'🌿',farming:'🌾',market:'📈',finance:'💰',weather:'🌦'};
            const nm = {general:'General',farming:'Kilimo',market:'Soko',finance:'Fedha',weather:'Hewa'};
            topicBadge.textContent = `${ico[currentTopic]} ${nm[currentTopic]}`;
        });
    });

    // Quick buttons
    document.querySelectorAll('.quick-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            input.value = btn.dataset.msg;
            sendMessage();
        });
    });

    // Auto-resize textarea
    input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 100) + 'px';
    });
</script>

</body>
</html>
